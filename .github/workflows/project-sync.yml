name: Project Board Sync

on:
  issues:
    types: [opened, closed, reopened, labeled, unlabeled, assigned, unassigned]
  pull_request:
    types: [opened, closed, reopened, ready_for_review, converted_to_draft, labeled, unlabeled, synchronize]

permissions:
  contents: read

jobs:
  sync:
    uses: lpasquali/rune-ci/.github/workflows/project-sync-logic.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265
    secrets:
      PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
